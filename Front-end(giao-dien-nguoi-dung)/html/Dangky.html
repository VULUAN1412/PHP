<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Giày Thể Thao</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dangky.css">
</head>
<body>
    <a href="Trangchu.html" class="back-btn-page"><i class="fas fa-arrow-left"></i> Quay lại</a>
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h1>Đăng ký</h1>
            </div>
            
            <div class="signup-body">
                <div class="form-group">
                    <label for="email" class="label">Email</label>
                    <input type="email" id="email" class="input" placeholder="example@email.com">
                    <p class="form-hint"><i class="fas fa-info-circle"></i> ví dụ: anhdthu@email.com</p>
                </div>
                
                <div class="form-group">
                    <label for="phone" class="label">Số điện thoại</label>
                    <input type="tel" id="phone" class="input" placeholder="+84 000-0000-000">
                </div>
                
                <div class="form-group">
                    <label for="password" class="label">Mật khẩu</label>
                    <input type="password" id="password" class="input" placeholder="Nhập mật khẩu">
                    <p class="form-note"><i class="fas fa-lock"></i> Lưu ý: Mật khẩu phải có ít nhất 8 ký tự, bao gồm cả chữ hoa, chữ thường, chữ số và ký tự đặc biệt.</p>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password" class="label">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" class="input" placeholder="Xác nhận lại mật khẩu">
                </div>
                
                <button class="signup-btn">Tạo tài khoản</button>
                
                <p class="login-text">Bạn đã có tài khoản? <a href="../Dangnhap.html" class="login-link">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>
</body>
<script src="../js/common.js"></script>
</html>
